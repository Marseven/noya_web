name: NOYA Global CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, sqlite3, pdo_sqlite, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy-all:
    name: Sync Repos + Deploy Hostinger
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_APP_PASSWORD: ${{ secrets.BITBUCKET_APP_PASSWORD }}
          BITBUCKET_FRONTEND_REPO: ${{ secrets.BITBUCKET_FRONTEND_REPO }}
          BITBUCKET_BACKEND_REPO: ${{ secrets.BITBUCKET_BACKEND_REPO }}
          GITHUB_BACKEND_REPO: ${{ secrets.GITHUB_BACKEND_REPO }}
          GITHUB_BACKEND_PAT: ${{ secrets.GITHUB_BACKEND_PAT }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_FRONT_DIR: ${{ secrets.HOSTINGER_FRONT_DIR }}
          HOSTINGER_BACK_DIR: ${{ secrets.HOSTINGER_BACK_DIR }}
        run: |
          set -euo pipefail
          required=(
            BITBUCKET_USERNAME
            BITBUCKET_APP_PASSWORD
            BITBUCKET_FRONTEND_REPO
            BITBUCKET_BACKEND_REPO
            GITHUB_BACKEND_REPO
            GITHUB_BACKEND_PAT
            HOSTINGER_HOST
            HOSTINGER_PORT
            HOSTINGER_USER
            HOSTINGER_PASSWORD
            HOSTINGER_FRONT_DIR
            HOSTINGER_BACK_DIR
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Push backend to Bitbucket
        env:
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_APP_PASSWORD: ${{ secrets.BITBUCKET_APP_PASSWORD }}
          BITBUCKET_BACKEND_REPO: ${{ secrets.BITBUCKET_BACKEND_REPO }}
        run: |
          set -euo pipefail
          git remote add bitbucket "https://${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}@bitbucket.org/${BITBUCKET_BACKEND_REPO}.git"
          git push bitbucket HEAD:main

      - name: Push backend to GitHub (mirror)
        env:
          GITHUB_BACKEND_REPO: ${{ secrets.GITHUB_BACKEND_REPO }}
          GITHUB_BACKEND_PAT: ${{ secrets.GITHUB_BACKEND_PAT }}
        run: |
          set -euo pipefail
          git remote add github-mirror "https://x-access-token:${GITHUB_BACKEND_PAT}@github.com/${GITHUB_BACKEND_REPO}.git"
          git push github-mirror HEAD:main

      - name: Clone frontend repository from Bitbucket
        env:
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_APP_PASSWORD: ${{ secrets.BITBUCKET_APP_PASSWORD }}
          BITBUCKET_FRONTEND_REPO: ${{ secrets.BITBUCKET_FRONTEND_REPO }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main "https://${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}@bitbucket.org/${BITBUCKET_FRONTEND_REPO}.git" frontend-src

      - name: Build frontend
        working-directory: frontend-src
        run: |
          npm ci
          npm run build

      - name: Push frontend to Bitbucket
        working-directory: frontend-src
        run: git push origin main

      - name: Sync frontend to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_FRONT_DIR: ${{ secrets.HOSTINGER_FRONT_DIR }}
        run: |
          set -euo pipefail
          sshpass -p "$HOSTINGER_PASSWORD" rsync -az \
            -e "ssh -p $HOSTINGER_PORT -o StrictHostKeyChecking=accept-new" \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.env.local' \
            --exclude '.DS_Store' \
            frontend-src/ \
            "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_FRONT_DIR/"

      - name: Sync backend to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_BACK_DIR: ${{ secrets.HOSTINGER_BACK_DIR }}
        run: |
          set -euo pipefail
          sshpass -p "$HOSTINGER_PASSWORD" rsync -az \
            -e "ssh -p $HOSTINGER_PORT -o StrictHostKeyChecking=accept-new" \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude 'frontend-src/' \
            --exclude 'vendor/' \
            --exclude 'node_modules/' \
            --exclude 'storage/logs/' \
            --exclude '.DS_Store' \
            ./ \
            "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_BACK_DIR/"

      - name: Run backend post-deploy tasks on Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_BACK_DIR: ${{ secrets.HOSTINGER_BACK_DIR }}
        run: |
          set -euo pipefail
          sshpass -p "$HOSTINGER_PASSWORD" ssh \
            -p "$HOSTINGER_PORT" \
            -o StrictHostKeyChecking=accept-new \
            "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "set -e; cd '$HOSTINGER_BACK_DIR'; php artisan migrate --force; php artisan optimize:clear; php artisan optimize"
